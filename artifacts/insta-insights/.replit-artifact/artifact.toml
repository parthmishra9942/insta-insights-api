kind = "mobile"
previewPath = "/"
title = "Insta Insights"
version = "1.0.0"
id = "artifacts/insta-insights"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 24905

[services.development]
run = "pnpm --filter @workspace/insta-insights run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/insta-insights", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/insta-insights", "run", "serve" ]

[services.env]
PORT = "24905"
BASE_PATH = "/"
